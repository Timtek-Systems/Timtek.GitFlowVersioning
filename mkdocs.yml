site_name: Timtek.GitFlowVersioning
site_url: https://timtek-systems.github.io/Timtek.GitFlowVersioning/
site_description: A minimal, opinionated GitFlow-focussed versioning utility for .NET MSBuild
repo_url: https://github.com/Timtek-Systems/Timtek.GitFlowVersioning
repo_name: Timtek-Systems/Timtek.GitFlowVersioning

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    alias: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works: how-it-works.md
  - Version Variables: version-variables.md
  - CI Integration: ci-integration.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
