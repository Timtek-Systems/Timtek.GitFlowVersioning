name: CI Build

on:
  push:
    branches: ["**"]
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for versioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test
        run: dotnet test --no-build --configuration ${{ env.CONFIGURATION }} --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Pack
        run: dotnet pack --no-build --configuration ${{ env.CONFIGURATION }} --output nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

      # All successful builds push to MyGet
      - name: Push to MyGet
        if: github.event_name == 'push'
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://www.myget.org/F/tigra-astronomy/api/v2/package --api-key ${{ secrets.MYGET_API_KEY }} --skip-duplicate

      # Tagged commits on main also push to NuGet.org
      - name: Check tag is on main
        id: check-main
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main
          if git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to NuGet.org
        if: steps.check-main.outputs.on_main == 'true'
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

