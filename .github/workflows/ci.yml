name: CI Build

on:
  push:
    branches: ["**"]
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for versioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore Timtek.GitFlowVersioning.slnx

      - name: Build
        run: dotnet build Timtek.GitFlowVersioning.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test
        run: dotnet test Timtek.GitFlowVersioning.slnx --no-build --configuration ${{ env.CONFIGURATION }} --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Determine package version
        id: pkg-version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # Fall back to the version in the csproj
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: |
          VERSION_ARG=""
          if [[ -n "${{ steps.pkg-version.outputs.version }}" ]]; then
            VERSION_ARG="/p:Version=${{ steps.pkg-version.outputs.version }}"
          fi
          dotnet pack src/Timtek.GitFlowVersioning/Timtek.GitFlowVersioning.csproj --no-build --configuration ${{ env.CONFIGURATION }} --output nupkgs $VERSION_ARG

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

      # Pack the test subject to verify the versioning task stamps the correct version.
      # This is NOT pushed to any feed; it only validates end-to-end NuGet versioning.
      - name: Pack test subject
        run: dotnet pack tests/Timtek.GitFlowVersioning.TestSubject/Timtek.GitFlowVersioning.TestSubject.csproj --configuration ${{ env.CONFIGURATION }} --output test-nupkgs

      - name: Verify test subject version
        run: |
          echo "::group::Test subject packages"
          ls -la test-nupkgs/
          echo "::endgroup::"
          EXPECTED="${{ steps.pkg-version.outputs.version }}"
          if [[ -n "$EXPECTED" ]]; then
            if ls test-nupkgs/*"${EXPECTED}"*.nupkg 1>/dev/null 2>&1; then
              echo "✅ Test subject package version matches expected: ${EXPECTED}"
            else
              echo "❌ Expected test subject package version ${EXPECTED} but got:"
              ls test-nupkgs/
              exit 1
            fi
          else
            echo "ℹ️ No explicit version expected (branch build). Test subject packages:"
            ls test-nupkgs/
          fi

      - name: Upload test subject packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-subject-nupkgs
          path: test-nupkgs/*.nupkg

      # All successful builds push to MyGet
      - name: Push to MyGet
        if: github.event_name == 'push'
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://www.myget.org/F/tigra-astronomy/api/v2/package --api-key ${{ secrets.MYGET_API_KEY }} --skip-duplicate

      # Tagged commits on main also push to NuGet.org
      - name: Check tag is on main
        id: check-main
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main
          if git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to NuGet.org
        if: steps.check-main.outputs.on_main == 'true'
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

